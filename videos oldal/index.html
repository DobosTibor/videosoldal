<!DOCTYPE html>
<html lang="hu">
<head>
<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dobos Tibor</title>

<style>
@keyframes fromTop {
  from { opacity:0; transform: translateY(-60px); }
  to { opacity:1; transform: translateY(0); }
}

@keyframes fromBottom {
  from { opacity:0; transform: translateY(60px); }
  to { opacity:1; transform: translateY(0); }
}

@keyframes zoomIn {
  from { transform: scale(1.2); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  overflow-x:hidden;
}

body {
  font-family: Arial, sans-serif;
  background:black;
  color:white;
  scroll-behavior:smooth;
}

/* HEADER */
header {
  background: transparent;
  padding:20px 0;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  transition: transform 0.4s ease;
}

.header-container {
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1400px;
  margin:0 auto;
  padding:0 20px;
}

.logo img {
  height:40px;
  width:auto;
  display:block;
}

nav ul {
  list-style:none;
  display:flex;
  gap:16px;
}

nav a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  position:relative;
  padding-bottom:4px;
}

nav a::after {
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:0;
  height:2px;
  background:rgb(118, 69, 255);
  transition:width 0.3s ease;
}

nav a:hover::after {
  width:100%;
}

/* DROPDOWN */
.dropdown {
  position: relative;
}

.dropbtn {
  background: transparent;
  color: white;
  border: 1px solid rgb(118,69,255);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.dropbtn:hover {
  background: rgb(118,69,255);
  color: black;
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 110%;
  left: 0;
  background: rgba(0,0,0,0.9);
  min-width: 150px;
  border: 1px solid rgb(118,69,255);
  border-radius: 10px;
  overflow: hidden;
  z-index: 1001;
}

.dropdown-content a {
  display: block;
  padding: 10px;
  color: white;
  text-decoration: none;
}

.dropdown-content a:hover {
  background: rgb(118,69,255);
  color: black;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* HERO */
.hero {
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero video {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.4) 15%,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0) 60%,
    rgba(0,0,0,0.5) 85%,
    rgba(0,0,0,0.98) 100%
  );
  z-index:-1;
}

.hero-content {
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:20px;
}

.hero-content h1 {
  font-family: "Shadows Into Light", cursive;
  font-size:64px;
  font-weight:300;
  letter-spacing:2px;
  white-space:nowrap;
  animation: zoomIn 1.5s ease-out forwards;
}

.t1 { animation: fromTop 1s ease-out forwards; }
.t2 { animation: fromBottom 1s ease-out forwards; margin-left:10px; }

/* BUTTONS */
.button-container {
  display:flex;
  gap:20px;
}

.button1, .button2 {
  padding:12px 28px;
  border-radius:30px;
  border:1px solid rgb(118,69,255);
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.button1 { animation: fromBottom 1s ease-out forwards; }
.button2 { background:rgba(118,69,255,0.5); animation: fromTop 1s ease-out forwards; }

.button1:hover {
  background:rgb(118,69,255);
  color:black;
}

.button2:hover {
  background:black;
}

/* SECTIONS */
section {
  padding:100px 20px;
  scroll-margin-top:80px;
}

.fade-in {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade-in.show {
  opacity:1;
  transform:translateY(0);
}

/* ABOUT */
.about {
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  align-items:center;
  justify-content:center;
}

.about-image {
  flex:1;
  min-width:300px;
  max-width:500px;
  position:relative;
}

.about-image img {
  width:100%;
  display:block;
  border-radius:20px;
}

.about-image::after {
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.85), transparent 25%, transparent 75%, rgba(0,0,0,0.85)),
    linear-gradient(to right, transparent, rgba(0,0,0,0.9));
  pointer-events:none;
}

.about-text {
  flex:1;
  min-width:300px;
}

.about-text h2 {
  color:rgb(118,69,255);
  margin-bottom:20px;
}

/* CONTACT */
.contact-icons {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  margin-top:20px;
}

.contact-icons img {
  width:40px;
  transition:0.3s;
}

.contact-icons img:hover {
  transform:scale(1.2);
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:black;
  color:#aaa;
  font-size:14px;
  border-top:1px solid rgba(118,69,255,0.3);
}
</style>
</head>

<body>

<header>
  <div class="header-container">

    <div style="display:flex; align-items:center; gap:15px;">

      <div class="logo">
        <img src="kepek/logo.png" alt="Logo">
      </div>

      <div class="dropdown">
        <button class="dropbtn">Menü</button>
        <div class="dropdown-content">
          <a href="#about">Rólam</a>
          <a href="#contact">Kontakt</a>
        </div>
      </div>

    </div>

    <nav>
      <ul>
        <li><a href="#about">Rólam</a></li>
        <li><a href="#contact">Kontakt</a></li>
      </ul>
    </nav>

  </div>
</header>

<div class="hero">
  <video autoplay muted loop playsinline preload="auto">
    <source src="videok/loop.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1>
      <span class="t1">Üdvözöllek</span>
      <span class="t2">a weboldalamon!</span>
    </h1>

    <div class="button-container">
      <a href="#about" class="button1">Rólam</a>
      <a href="#contact" class="button2">Kapcsolat</a>
    </div>
  </div>
</div>

<section id="about" class="about fade-in">
  <div class="about-image">
    <img src="kepek/en.jpg" alt="">
  </div>
  <div class="about-text">
    <h2>Rólam</h2>
    <p>Dobos Tibor vagyok, 17 éves. Jelenleg napjaim nagy részét azzal tölttöm hogy koptatom a padot.</p>
  </div>
</section>

<section id="contact" class="fade-in">
  <h2 style="text-align:center;">Kontakt</h2>

  <div class="contact-icons">
    <a href="#"><img src="kepek/instagram.png"></a>
    <a href="#"><img src="kepek/facebook.png"></a>
    <a href="#"><img src="kepek/gmail.png"></a>
    <a href="#"><img src="kepek/phone.png"></a>
  </div>
</section>

<script>
const elements = document.querySelectorAll('.fade-in');

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('show');
  });
},{threshold:0.2});

elements.forEach(el => observer.observe(el));

let lastScroll = 0;
const header = document.querySelector("header");

window.addEventListener("scroll", () => {
  let currentScroll = window.scrollY;

  if (currentScroll > lastScroll && currentScroll > 100) {
    header.style.transform = "translateY(-100%)";
  } else {
    header.style.transform = "translateY(0)";
  }

  lastScroll = currentScroll;
}, { passive: true });
</script>

<footer>
  <p>© 2026 Dobos Tibor – Minden jog fenntartva</p>
</footer>

</body>
</html>
